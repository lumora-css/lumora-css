name: Build Framework

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build Framework
      run: bun run build.js

    - name: Commit build artifacts
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: automated build artifacts update"
        # Force add dist folders in case they are in .gitignore
        add_options: '-f'
        file_pattern: 'dist/* docs/static/dist/*'
