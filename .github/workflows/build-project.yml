name: Build Framework

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Repo
      uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build Framework
      run: bun run build.js

    - name: Commit build artifacts to main
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -f dist/
        git commit -m "chore: automated build artifacts update" || echo "No changes to commit"
        git push

    - name: Checkout Target Docs Repo
      uses: actions/checkout@v4
      with:
        repository: lumora-css/lumora-css.github.io
        token: ${{ secrets.DEPLOY_TOKEN }}
        path: gh-pages-repo

    - name: Deploy Docs to Target Repo
      run: |
        # Clear out target repo (keeping .git)
        cd gh-pages-repo
        find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
        cd ..
        # Generate static docs directly into target repo
        node docs-build.js gh-pages-repo
        # Copy framework files (dist) into target repo
        cp -R dist gh-pages-repo/dist
        # Commit and push
        cd gh-pages-repo
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "docs: auto-deploy from lumora-css main repository" || echo "No changes to deploy"
        git push
