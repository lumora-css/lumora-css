name: Build Framework

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Repo
      uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build Framework
      run: bun run build.js

    - name: Commit build artifacts to main
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -f dist/
        git commit -m "chore: automated build artifacts update" || echo "No changes to commit"
        git push

    - name: Deploy Docs to Target Repo
      run: |
        # Create output directory
        mkdir gh-pages-repo
        
        # Generate static docs directly into target repo
        node docs-build.js gh-pages-repo
        
        # Copy framework files (dist) into target repo
        cp -R dist gh-pages-repo/dist
        
        # Initialize Git and force push to the target repo
        cd gh-pages-repo
        git init
        git checkout -b main
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "docs: auto-deploy from lumora-css main repository"
        
        # Push using the DEPLOY_TOKEN, forcing to main branch
        git push https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/lumora-css/lumora-css.github.io.git main --force
